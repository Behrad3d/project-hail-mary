<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astrophage Life Cycle — Project Hail Mary</title>
<link rel="stylesheet" href="astrophage.css">
</head>
<body class="page-02">
<div class="container">
  <h1>ASTROPHAGE LIFE CYCLE — PROJECT HAIL MARY / ANDY WEIR</h1>

  <canvas id="sc"></canvas>

  <div class="stats">
    <div class="stat-card"><div class="stat-label">SOLAR OUTPUT</div><div class="stat-val" id="st-sol">100%</div></div>
    <div class="stat-card"><div class="stat-label">VENUS CO₂</div><div class="stat-val" id="st-co2">96%</div></div>
    <div class="stat-card"><div class="stat-label">ASTROPHAGE COLONY SIZE</div><div class="stat-val" id="st-col">6</div></div>
    <div class="stat-card"><div class="stat-label">YEAR</div><div class="stat-val" id="st-yr">yr 1</div></div>
  </div>

  <div class="controls">
    <button class="btn btn-play"  id="btn-pp">▶ play</button>
    <button class="btn btn-reset" id="btn-reset">↺ reset</button>
    <button class="btn btn-speed" id="btn-spd">speed: 1×</button>
  </div>

  <div class="log" id="pdesc"></div>
</div>

<script>
const cv=document.getElementById('sc');
const g=cv.getContext('2d');
const VW=680,VH=320;
const SX=300,SY=155;
const VX=213,VY=SY; // Venus pure-left: angle=π, orbit=87px

const SD=[65,80,65,80]; // stage durations: energize,outbound,breed,inbound
const MC=8; // max cycles
const TC=290; // ticks per cycle (sum of SD)
const TT=TC*MC; // 2320 total ticks

let gt=0,spd=1,running=false;

const sr=s=>{const v=Math.sin(s*127.1+311.7)*43758.5453;return v-Math.floor(v);};
const lp=(a,b,t)=>a+(b-a)*Math.max(0,Math.min(1,t));
const cl=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const visN=ci=>Math.min(70,6*Math.pow(2,ci));
const realN=ci=>6*Math.pow(2,ci);

const STARS=Array.from({length:150},(_,i)=>({x:sr(i)*VW,y:sr(i+50)*VH,r:.5+sr(i+100)*.9,a:.18+sr(i+200)*.45}));
const ISPOT=Array.from({length:16},(_,i)=>({a0:(i/16)*Math.PI*2+.4,fr:4+sr(i)*12,sz:1.3+sr(i+50)*2.2,sp:.002+sr(i+80)*.004}));

function state(){
  const done=gt>=TT;
  const t=Math.min(gt,TT-1);
  const ci=Math.floor(t/TC);
  let st=t%TC,si=0;
  for(let s=0;s<4;s++){if(st<SD[s]){si=s;break;}st-=SD[s];}
  return{ci,si,sp:st/SD[si],done};
}

// ── DRAW BG ───────────────────────────────────────────────────────────────────
function dBg(){
  g.fillStyle='#040710';g.fillRect(0,0,VW,VH);
  STARS.forEach(s=>{g.beginPath();g.arc(s.x,s.y,s.r,0,Math.PI*2);g.fillStyle=`rgba(200,205,235,${s.a})`;g.fill();});
}

// ── DRAW SUN ──────────────────────────────────────────────────────────────────
function dSun({ci,si,sp}){
  const inf=cl((ci*2.8+(si>=2?sp*.9:0))/22,0,1);
  for(let gr=52;gr>22;gr-=5){
    g.beginPath();g.arc(SX,SY,gr,0,Math.PI*2);
    g.fillStyle=`rgba(255,148,28,${.054*(1-inf*.65)*(1-(gr-22)/32)})`;g.fill();
  }
  const rc=Math.floor(lp(255,112,inf)),gc=Math.floor(lp(178,52,inf)),bc=Math.floor(lp(38,12,inf));
  g.beginPath();g.arc(SX,SY,22,0,Math.PI*2);g.fillStyle=`rgb(${rc},${gc},${bc})`;g.fill();
  if(inf>.04) ISPOT.forEach((ip,i)=>{
    const al=cl((inf-i*.055)*4,0,1);if(!al)return;
    const sa=ip.a0+gt*ip.sp;
    const fx=SX+Math.cos(sa)*Math.min(ip.fr,16)*.56;
    const fy=SY+Math.sin(sa)*Math.min(ip.fr,16)*.56;
    g.beginPath();g.arc(fx,fy,ip.sz*al,0,Math.PI*2);g.fillStyle=`rgba(45,15,0,${.9*al})`;g.fill();
  });
  g.font='9px monospace';g.textAlign='center';g.fillStyle='rgba(255,175,55,.6)';g.fillText('SOL',SX,SY+33);
}

// ── DRAW PLANETS ──────────────────────────────────────────────────────────────
function dPlanets({si,sp}){
  [54,87,130,172].forEach(r=>{
    g.beginPath();g.arc(SX,SY,r,0,Math.PI*2);g.strokeStyle='rgba(155,160,200,.11)';g.lineWidth=.6;g.stroke();
  });
  // Venus glow during breed
  if(si===2){
    const pu=Math.sin(gt*.15)*.5+.5;
    g.beginPath();g.arc(VX,VY,14+pu*5,0,Math.PI*2);
    g.strokeStyle=`rgba(250,199,117,${.1+pu*.1})`;g.lineWidth=1.5;g.stroke();
    // mitosis flash + ×2 label
    if(sp>.47&&sp<.59){
      const fi=1-Math.abs(sp-.53)/.06;
      g.beginPath();g.arc(VX,VY,20+fi*8,0,Math.PI*2);
      g.strokeStyle=`rgba(255,235,140,${fi*.65})`;g.lineWidth=2.5;g.stroke();
      g.font=`500 ${Math.floor(10+fi*5)}px monospace`;
      g.fillStyle=`rgba(255,225,100,${fi*.9})`;g.textAlign='center';
      g.fillText('× 2',VX,VY-24);
    }
  }
  const PL=[[54,1.2,3.2,'#B4B2A9','mercury'],[87,Math.PI,5.5,'#FAC775','venus'],[130,-.785,6.5,'#85B7EB','earth'],[172,2.5,4.8,'#F0997B','mars']];
  PL.forEach(([or,an,r,col,lb])=>{
    const px=SX+Math.cos(an)*or,py=SY+Math.sin(an)*or;
    g.beginPath();g.arc(px,py,r,0,Math.PI*2);g.fillStyle=col;g.fill();
    g.font='9px monospace';g.fillStyle='rgba(185,190,215,.6)';g.textAlign='center';
    g.fillText(lb,px,py-r-5);
  });
}

// ── DRAW PETROVA LINE ─────────────────────────────────────────────────────────
function dPetrova({ci,si}){
  // Line gets thicker + brighter each cycle
  const thick=.5+ci*.6;
  const ba=cl(.05+ci*.023,0,.42);
  const isAct=si===1||si===3;
  // Base line (always present, grows with each cycle)
  g.beginPath();g.moveTo(VX,VY);g.lineTo(SX,SY);
  g.strokeStyle=`rgba(250,199,117,${ba})`;g.lineWidth=thick;g.stroke();
  // Animated traffic during migration
  if(isAct){
    const aa=cl(.18+ci*.03,0,.58);
    g.strokeStyle=`rgba(250,199,117,${aa})`;
    g.lineWidth=thick+2;
    g.setLineDash([5,9]);
    // outbound: dashes flow Sun→Venus (positive dashOffset moves dash start toward Venus)
    // inbound:  dashes flow Venus→Sun
    g.lineDashOffset=si===1?(gt*.55%14):-(gt*.55%14);
    g.stroke();g.setLineDash([]);g.lineDashOffset=0;
    g.font='8px monospace';g.fillStyle=`rgba(250,199,117,${aa})`;g.textAlign='center';
    g.fillText('petrova line  0.92c',(SX+VX)/2,(SY+VY)/2-11);
  }
}

// ── DRAW PARTICLES ────────────────────────────────────────────────────────────
function dParts({ci,si,sp}){
  const n=visN(ci);
  const A='rgba(250,200,118,', B='rgba(239,159,39,';

  // Energize: orbit sun
  if(si===0){
    for(let i=0;i<n;i++){
      const a=(i/n)*Math.PI*2+gt*(.008+sr(i)*.005);
      const r=22+sr(i)*10;
      g.beginPath();g.arc(SX+Math.cos(a)*r,SY+Math.sin(a)*r,1.8,0,Math.PI*2);
      g.fillStyle=A+'.8)';g.fill();
    }
  }

  // Outbound: Sun → Venus (horizontal path, spread vertically)
  else if(si===1){
    for(let i=0;i<n;i++){
      const dep=sr(i)*.38, off=(sr(i+100)*2-1)*12;
      if(sp<dep){ // still orbiting sun
        const a=(i/n)*Math.PI*2+gt*(.008+sr(i)*.005);
        const r=22+sr(i)*10;
        g.beginPath();g.arc(SX+Math.cos(a)*r,SY+Math.sin(a)*r,1.8,0,Math.PI*2);
        g.fillStyle=A+'.7)';g.fill();
      } else {
        const tp=cl((sp-dep)/(1-dep*.6),0,1);
        g.beginPath();g.arc(lp(SX,VX,tp),SY+off*Math.sin(tp*Math.PI),1.8,0,Math.PI*2);
        g.fillStyle=`${A}${.3+tp*.6})`;g.fill();
      }
    }
  }

  // Breed: orbit Venus, children emerge at sp>0.52
  else if(si===2){
    for(let i=0;i<n;i++){
      const a=(i/n)*Math.PI*2+gt*(.012+sr(i)*.008);
      const r=6+sr(i)*9;
      const px=VX+Math.cos(a)*r,py=VY+Math.sin(a)*r;
      g.beginPath();g.arc(px,py,1.8,0,Math.PI*2);g.fillStyle=A+'.85)';g.fill();
      if(sp>.52){
        const fp=(sp-.52)/.48;
        const ca=a+fp*1.4, cr=r+fp*5;
        g.beginPath();g.arc(VX+Math.cos(ca)*cr,VY+Math.sin(ca)*cr,fp*1.8,0,Math.PI*2);
        g.fillStyle=`${B}${.4+fp*.45})`;g.fill();
      }
    }
  }

  // Inbound: doubled colony, Venus → Sun
  else if(si===3){
    const rn=Math.min(70,n*2);
    for(let i=0;i<rn;i++){
      const isC=i>=n, bi=isC?i-n:i;
      const dep=sr(bi+(isC?200:0))*.38, off=(sr(i+300)*2-1)*12;
      if(sp<dep){ // still on Venus
        const a=(i/rn)*Math.PI*2+gt*(.012+sr(i)*.008);
        const r=6+sr(i)*9;
        g.beginPath();g.arc(VX+Math.cos(a)*r,VY+Math.sin(a)*r,1.8,0,Math.PI*2);
        g.fillStyle=(isC?B:A)+'.85)';g.fill();
      } else {
        const tp=cl((sp-dep)/(1-dep*.6),0,1);
        g.beginPath();g.arc(lp(VX,SX,tp),SY+off*Math.sin(tp*Math.PI),1.8,0,Math.PI*2);
        g.fillStyle=`${isC?B:A}${.3+tp*.6})`;g.fill();
      }
    }
  }
}

// ── TIMELINE BAR ──────────────────────────────────────────────────────────────
function dTimeline(){
  const prog=Math.min(1,gt/TT);
  const bx=12,by=299,bw=656,bh=5;
  g.fillStyle='rgba(155,158,188,.1)';g.fillRect(bx,by,bw,bh);
  const tc=prog<.3?'#5DCAA5':prog<.6?'#FAC775':prog<.82?'#EF9F27':'#E24B4A';
  g.fillStyle=tc;g.fillRect(bx,by,bw*prog,bh);
  // Playhead
  g.fillStyle=tc;g.fillRect(bx+bw*prog-1,by-2,2,bh+2);
  // Cycle markers
  for(let c=1;c<MC;c++){
    const x=bx+bw*(c/MC);
    g.fillStyle='rgba(155,158,188,.28)';g.fillRect(x-.5,by-3,1,bh+3);
    g.font='8px monospace';g.fillStyle='rgba(155,158,188,.32)';g.textAlign='center';
    g.fillText('c'+(c+1),x,by-5);
  }
}

// ── HUD LABEL ─────────────────────────────────────────────────────────────────
function dHud({ci,si,done}){
  const SL=['ENERGIZING','MIGRATING →','BREEDING','← RETURNING'];
  const label=done?'CRISIS — HAIL MARY AUTHORIZED':'CYCLE '+(ci+1)+' / '+MC+'  ·  '+SL[si];
  g.font='500 9px monospace';g.fillStyle=done?'rgba(226,75,74,.55)':'rgba(155,158,188,.38)';
  g.textAlign='left';g.fillText(label,12,16);
}

// ── CRISIS OVERLAY ────────────────────────────────────────────────────────────
function dCrisis(){
  g.fillStyle='rgba(226,75,74,.08)';g.fillRect(0,0,VW,VH);
  g.font='500 13px monospace';g.fillStyle='rgba(226,75,74,.75)';
  g.textAlign='center';g.fillText('CRISIS — HAIL MARY PROTOCOL AUTHORIZED',VW/2,VH/2-9);
  g.font='10px monospace';g.fillStyle='rgba(226,75,74,.5)';
  g.fillText('click ↺ reset to replay',VW/2,VH/2+12);
}

// ── DOM STATS ─────────────────────────────────────────────────────────────────
function updateDom({ci,si,sp,done}){
  const sLoss=ci*2.8+(si>=2?sp*.9:0);
  const sol=Math.round(Math.max(72,100-sLoss));
  const co2=Math.round(Math.max(4,96-ci*10.5-(si===2?sp*10.5:si>=3?10.5:0)));
  const cn=realN(si>=3?ci+1:ci);
  const yr=Math.floor((gt/TT)*28)+1;

  const sEl=document.getElementById('st-sol');
  sEl.textContent=sol+'%';
  sEl.style.color=sol<85?'#E24B4A':sol<95?'#EF9F27':'';

  document.getElementById('st-co2').textContent=co2+'%';

  const cEl=document.getElementById('st-col');
  cEl.textContent=cn>=1000?Math.round(cn/100)/10+'k':cn;
  cEl.style.color=cn>100?'#EF9F27':cn>400?'#E24B4A':'';

  const yEl=document.getElementById('st-yr');
  yEl.textContent='yr '+yr;
  yEl.style.color=yr>20?'#E24B4A':yr>12?'#EF9F27':'';

  const descs=[
    `Cycle ${ci+1} — astrophage energizing at Sol. Absorbing stellar radiation, filling internal stores. Magnetic field lines funnel them to the solar north pole — the only place the Venus CO₂ signal is visible.`,
    `Migrating to Venus at 0.92c along the Petrova line. Guided by CO₂ spectral lines at 4.26μm and 18.31μm. Venus: 90 atm, near-pure CO₂. Travel time at this scale: ~3 days.`,
    sp<.52
      ?`Arrived at Venus upper atmosphere. Collecting CO₂ to synthesize proteins and DNA. Pre-mitosis — building to the division threshold.`
      :`MITOSIS — each cell dividing into two. Parent and child will both return to Sol. Colony now ${cn} and climbing.`,
    `Returning to Sol — ${Math.min(70,visN(ci)*2)} particles en route, double what departed. Petrova line at peak density and width. Cycle ${ci+2} begins on arrival.`
  ];
  document.getElementById('pdesc').textContent=done
    ?`CRISIS — ${MC} cycles complete. Solar output at 72%. Venus CO₂ at 4%. Colony is ${realN(MC)}× original size. The pattern is repeating at every nearby star. That is why Tau Ceti matters.`
    :descs[si];
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
function loop(){
  if(running&&gt<TT) gt=Math.min(TT,gt+spd);
  if(gt>=TT&&running){running=false;document.getElementById('btn-pp').textContent='▶ play';}

  const s=state();
  const dpr=devicePixelRatio||1;
  const cw=cv.width/dpr, ch=cv.height/dpr;
  g.save();g.scale(dpr*(cw/VW),dpr*(ch/VH));

  dBg();
  dSun(s);
  dPlanets(s);
  dPetrova(s);
  dParts(s);
  dTimeline();
  dHud(s);
  if(s.done) dCrisis();

  g.restore();
  updateDom(s);
  requestAnimationFrame(loop);
}

// ── CONTROLS ──────────────────────────────────────────────────────────────────
document.getElementById('btn-pp').addEventListener('click',()=>{
  if(gt>=TT) gt=0;
  running=!running;
  document.getElementById('btn-pp').textContent=running?'⏸ pause':'▶ play';
});

document.getElementById('btn-reset').addEventListener('click',()=>{
  gt=0;running=false;
  document.getElementById('btn-pp').textContent='▶ play';
});

const SPEEDS=[1,2,4];let si=0;
document.getElementById('btn-spd').addEventListener('click',()=>{
  si=(si+1)%3;spd=SPEEDS[si];
  document.getElementById('btn-spd').textContent='speed: '+spd+'×';
});

function resize(){
  const dpr=devicePixelRatio||1,r=cv.getBoundingClientRect();
  cv.width=r.width*dpr;cv.height=r.height*dpr;
}
window.addEventListener('resize',resize);
setTimeout(()=>{resize();loop();},80);
if (window.self !== window.top) {
  setTimeout(() => { running = true; }, 300);
}
</script>
</body>
</html>
